name: bisawtak
description: "بصوتك - Speech to Text"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^14.8.1
  # HTTP
  dio: ^5.7.0
  # Local Storage
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  # Auth
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  # Audio
  file_picker: ^9.2.1
  # Share
  receive_sharing_intent: ^1.8.1
  share_plus: ^10.1.4
  # Ads
  google_mobile_ads: ^5.3.0
  # UI
  intl: ^0.20.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  # Utils
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

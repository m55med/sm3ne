name: Deploy Bisawtak API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /root/bisawtak

            # Pull latest changes
            git pull origin main

            # Check if requirements changed — only then rebuild
            if git diff HEAD~1 --name-only | grep -q "backend/requirements.txt"; then
              echo "requirements.txt changed — rebuilding container..."
              cd backend
              docker compose up -d --build
            else
              echo "Code-only change — hot-updating files..."
              docker cp /root/bisawtak/backend/main.py whisper-api:/app/main.py
              docker cp /root/bisawtak/backend/app/. whisper-api:/app/app/
              docker restart whisper-api
            fi

            echo "Deploy complete!"

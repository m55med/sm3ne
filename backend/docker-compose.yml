services:
  whisper-api:
    build: .
    container_name: whisper-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - whisper-cache:/root/.cache/whisper
    depends_on:
      bisawtak-db:
        condition: service_healthy
    networks:
      - bisawtak-net
      - proxy-network

  bisawtak-admin:
    build: ../admin
    container_name: bisawtak-admin
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Blank = use same-origin /api/v1, which is what we want when served
      # through nginx-proxy-manager on voice.neojeen.com.
      - NEXT_PUBLIC_API_URL=/api/v1
    networks:
      - proxy-network

  bisawtak-db:
    image: postgres:16-alpine
    container_name: bisawtak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bisawtak
      POSTGRES_USER: bisawtak
      POSTGRES_PASSWORD: bisawtak_pass
    volumes:
      - bisawtak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bisawtak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bisawtak-net

volumes:
  whisper-cache:
  bisawtak-pgdata:

networks:
  bisawtak-net:
    driver: bridge
  proxy-network:
    external: true
